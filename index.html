
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexus LMS">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135673.png">
    <title>Nexus LMS - Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Rich Text / HTML Rendering Styles */
        .lesson-content-html h1 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; color: white; }
        .lesson-content-html h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: white; }
        .lesson-content-html p { margin-bottom: 1rem; line-height: 1.6; }
        .lesson-content-html a { color: #fbbf24; text-decoration: underline; font-weight: 600; }
        .lesson-content-html ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .lesson-content-html ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .lesson-content-html img { border-radius: 1rem; max-width: 100%; margin: 1.5rem 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        
        /* Premium Support Button Styles */
        .btn-premium-support {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #d4af37 0%, #f1c40f 50%, #d4af37 100%);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 9999px;
            text-decoration: none !important;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            margin: 1rem 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-premium-support:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.5);
            filter: brightness(1.1);
        }
    </style>
